<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d14" />
  <meta name="description" content="Vibes — real-time Claude Code daemon controller" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vibes" />

  <title>Vibes</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="./style.css?v=19" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────── -->
  <header class="header">
    <div class="header-logo">
      Vibes <span>ctrl</span>
    </div>
    <div id="conn-badge" class="conn-badge" title="Connection status — tap to reconnect">
      <div id="conn-dot" class="conn-dot"></div>
      <span id="conn-label">offline</span>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────── -->
  <main class="main">

    <!-- Machine list -->
    <section class="machines-section">
      <div class="section-label">
        machines
        <button class="add-token-btn" id="add-token-btn" title="Add token">+</button>
        <button class="sessions-btn" id="sessions-btn" title="Browse sessions">sessions</button>
      </div>
      <div class="machines-scroll" id="machines-list" role="list" aria-label="Connected machines">
        <!-- Token group rows rendered by app.js -->
        <div class="machine-card-empty" style="width:100%">
          <div class="empty-face">( · _ · )</div>
          <span>no tokens added<br>tap + to add one</span>
        </div>
      </div>
    </section>

    <!-- Server URL row -->
    <div class="settings-row">
      <input
        type="text"
        id="server-url"
        class="server-url-input"
        placeholder="wss://vibes.forthetest.shop/ws"
        aria-label="WebSocket server URL"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <!-- Command input -->
    <section class="command-section">
      <div class="section-label">command</div>

      <div class="command-target-row">
        <div class="select-wrapper">
          <select id="target-select" aria-label="Target machine">
            <option value="">— pick target —</option>
          </select>
        </div>
        <input
          type="text"
          id="session-input"
          class="session-input"
          placeholder="session-id"
          aria-label="Resume session ID"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="prompt-row">
        <textarea
          id="prompt"
          placeholder="Enter prompt... (Enter to send, Shift+Enter for newline)"
          rows="2"
          aria-label="Command prompt"
          spellcheck="false"
        ></textarea>
        <button id="send-btn" class="send-btn" aria-label="Send command">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
    </section>

    <!-- Result stream -->
    <section class="results-section">
      <div class="section-label">output</div>
      <div class="results-scroll" id="results-scroll" role="log" aria-live="polite" aria-label="Command results">
        <div class="results-empty" id="results-empty">
          <div class="ascii">[ · ]</div>
          <div>no output yet</div>
          <div>select a machine and send a command</div>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Add Token Modal ──────────────────────────────── -->
  <div class="modal-overlay hidden" id="token-modal" role="dialog" aria-modal="true" aria-label="Add Token">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title">Add Token</h2>
      <p class="modal-sub">Connect to a relay server with a token to monitor machines.</p>

      <div class="modal-field">
        <label for="token-input">Access Token</label>
        <input
          type="password"
          id="token-input"
          placeholder="your-secret-token"
          autocomplete="current-password"
          spellcheck="false"
        />
      </div>

      <div class="modal-field">
        <label for="token-label">Label (optional)</label>
        <input
          type="text"
          id="token-label"
          placeholder="e.g. home, work, pi"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="modal-field">
        <label for="token-server">Server URL</label>
        <input
          type="text"
          id="token-server"
          placeholder="wss://vibes.forthetest.shop/ws"
          autocomplete="off"
          spellcheck="false"
        />
      </div>

      <div class="modal-actions">
        <button class="btn-ghost" id="token-cancel">Cancel</button>
        <button class="btn-primary" id="token-submit">Add</button>
      </div>
    </div>
  </div>

  <!-- ── Toast container ────────────────────────────────── -->
  <div class="toast-container" id="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <script src="./app.js?v=19"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
    }
  </script>
</body>
</html>
